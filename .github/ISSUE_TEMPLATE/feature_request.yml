name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What developer problem would this solve?
      placeholder: I want to route tool-calling steps to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Adaptive Model Router do?
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - SDK
        - Provider adapter
        - Dashboard
        - CLI
        - Storage
        - Documentation
        - Evaluation / benchmark
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: notes
    attributes:
      label: Additional context
