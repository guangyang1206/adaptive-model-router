name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize]

jobs:
  pr-title:
    # The repo is squash-merge only, so the PR title becomes the commit on `main`.
    # It must be a Conventional Commit. We lint the title, not individual commits,
    # so contributors can use messy WIP commits on their branch freely.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title is a Conventional Commit
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          set -euo pipefail
          pattern='^(feat|fix|docs|refactor|test|chore|ci|perf)(\([a-z0-9-]+\))?!?: .+'
          if [[ "$PR_TITLE" =~ $pattern ]]; then
            echo "✓ PR title OK: $PR_TITLE"
          else
            echo "::error::PR title must be a Conventional Commit (it becomes the squash commit on main)."
            echo "Got:      $PR_TITLE"
            echo "Expected: <type>(<scope>): <subject>"
            echo "  type  ∈ feat | fix | docs | refactor | test | chore | ci | perf"
            echo "  scope optional, e.g. (sdk) (cli) (dashboard)"
            echo "  example: feat(sdk): add Gemini provider adapter"
            exit 1
          fi

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install toolchain locally
        run: npm install --no-save typescript@^5.6.0 eslint@^9.13.0 typescript-eslint@^8.10.0 @eslint/js@^9.13.0

      - name: Lint
        run: npx eslint "packages/**/*.ts"

      - name: Typecheck
        run: npx tsc -p tsconfig.typecheck.json

      - name: Build SDK
        run: npx tsc -p packages/sdk/tsconfig.json

      - name: Build Dashboard
        run: npx tsc -p packages/dashboard/tsconfig.json

      - name: Build CLI
        run: npx tsc -p packages/cli/tsconfig.json

      - name: Run SDK tests
        run: node --test packages/sdk/test/index.test.mjs packages/sdk/test/storage.test.mjs packages/sdk/test/providers.test.mjs packages/sdk/test/adapters.test.mjs

      - name: Run dashboard tests
        run: node --test packages/dashboard/test/data-access.test.mjs

      - name: Run CLI smoke test
        shell: bash
        run: |
          set -euo pipefail
          TMPDIR="$(mktemp -d)"
          node packages/cli/dist/index.js init --cwd "$TMPDIR"
          node packages/cli/dist/index.js doctor --cwd "$TMPDIR"
          printf '{"event_type":"request_finished","schema_version":"1.0","request_id":"trace_demo","decision_id":"decision_demo","timestamp":"2026-06-27T00:00:00.000Z","payload":{"traceId":"trace_demo","decisionId":"decision_demo","status":"success","chosenModel":"local/demo","reason":"demo","attempts":[{"status":"success","provider":"local","modelId":"local/demo"}],"usage":{"totalTokens":12,"costUsd":0,"estimated":true},"estimated":true,"latencyMs":10}}\n' > "$TMPDIR/.adaptive-router/router.jsonl"
          node packages/cli/dist/index.js inspect --cwd "$TMPDIR"
          node packages/cli/dist/index.js export --cwd "$TMPDIR" --out "$TMPDIR/export.json"
          test -f "$TMPDIR/export.json"

      - name: Run dashboard smoke test
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module -e "import { createDashboard, createReadOnlyDataAccess } from './packages/dashboard/dist/index.js'; const traces=[{traceId:'trace_demo',decisionId:'decision_demo',chosenModel:'local/demo',candidates:[],reason:'demo route',attempts:[{status:'success',latencyMs:12}],usage:{totalTokens:12,costUsd:0,estimated:true},estimated:true,latencyMs:12,status:'success'}]; const models=[{id:'local/demo',provider:'local',type:'self-hosted',capabilities:['reasoning'],health:{status:'ok'},enabled:true}]; const dash=await createDashboard({port:4329,data:createReadOnlyDataAccess({listTraces:()=>traces,listModels:()=>models})}); const summary=await fetch(dash.url + '/api/metrics/summary').then(r=>r.json()); const html=await fetch(dash.url + '/requests').then(r=>r.text()); if(summary.code!=='OK'||!html.includes('Routing Decisions')) throw new Error('dashboard smoke failed'); await dash.close(); console.log('dashboard smoke passed');"
